<div class="layout">

<script>
let globalDf = null;
let global7dLabel = '';
let globalMulti = 2;
let globalSoldOut = {};
let globalSeason = {};
let currentSeason = '';
let currentMode = 'recommend'; // recommend | check
let allResults = [];
let currentTab = 'all';
let recCurrentSeason = '';
let firestoreSaved = false; // Firestore 중복 저장 방지

// ── 파일 업로드 ──
function onClickSaveFirebase() {
  if (!globalDf) { alert('먼저 파일을 업로드해주세요!'); return; }
  var btn = event.target;
  var status = document.getElementById('firebaseSaveStatus');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  if (status) status.textContent = '';
  firestoreSaved = false;
  saveToFirestore(window._lastFileName || '수동저장');
  // 완료 후 버튼 복원
  setTimeout(function() {
    btn.disabled = false;
    btn.textContent = '☁️ Firebase에 저장';
    if (status) status.textContent = '✓ 저장 완료!';
  }, 5000);
}

function loadFromFirestore() {
  if (!window.firebaseDb) { console.log('Firebase 미연결'); return; }
  var today = new Date();
  var yy = today.getFullYear();
  var mm = String(today.getMonth()+1).padStart(2,'0');
  var dd = String(today.getDate()).padStart(2,'0');
  var dateStr = yy + '-' + mm + '-' + dd;

  // 로딩 표시
  var mainArea = document.getElementById('mainArea');
  if (mainArea) {
    mainArea.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">오늘 데이터 불러오는 중...</div><div class="empty-desc">' + dateStr + ' 데이터를 Firebase에서 가져오고 있어요.</div></div>';
  }

  var q = window.firebaseQuery(
    window.firebaseCollection(window.firebaseDb, 'daily_sales'),
    window.firebaseWhere('date', '==', dateStr)
  );

  window.firebaseGetDocs(q).then(function(snapshot) {
    if (snapshot.empty) {
      console.log('오늘 Firebase 데이터 없음:', dateStr);
      if (mainArea) {
        mainArea.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">오늘 데이터가 없어요</div><div class="empty-desc">판매량 파일을 업로드하거나 담당자가 파일을 올려주면 자동으로 표시돼요.</div></div>';
      }
      return;
    }

    console.log('Firebase에서 오늘 데이터 로드:', snapshot.size, '개 상품');

    // Firebase 데이터로 globalDf 재구성
    var rows = [];
    snapshot.forEach(function(doc) {
      var data = doc.data();
      var code = data.code || '';
      var productName = data.productName || '';
      var optSales = data.optSales || {};
      var opt7dSales = data.opt7dSales || {};
      var optStock = data.optStock || {};
      var optOrder = data.optOrder || Object.keys(optSales);
      optOrder.forEach(function(opt) {
        var row = {};
        row['상품명'] = productName;
        row['옵션명'] = opt;
        row['당일 판매량'] = optSales[opt] || 0;
        row['일주일 판매량량'] = opt7dSales[opt] || 0;
        row['현재고'] = optStock[opt] || 0;
        row['_code'] = code;
        rows.push(row);
      });
    });

    globalDf = rows;
    global7dLabel = '일주일 판매량량 (' + dateStr + ')';

    // 품절/시즌 정보 products 컬렉션에서 로드
    window.firebaseGetDocs(window.firebaseCollection(window.firebaseDb, 'products')).then(function(prodSnap) {
      globalSeason = {};
      globalSoldOut = {};
      prodSnap.forEach(function(doc) {
        var data = doc.data();
        if (data.season && data.productName) {
          globalSeason[data.productName] = data.season;
        }
      });

      // fileLoaded 표시
      var fileLoaded = document.getElementById('fileLoaded');
      if (fileLoaded) {
        fileLoaded.style.display = 'block';
        fileLoaded.textContent = '✓ Firebase 데이터 로드됨 (' + dateStr + ')';
      }
      var fileStatus = document.getElementById('fileStatus');
      if (fileStatus) {
        fileStatus.textContent = rows.length.toLocaleString() + '행 로드됨';
        fileStatus.className = 'status-pill active';
      }

      runAutoRecommend();
    }).catch(function(err) {
      console.log('products 로드 실패, 시즌 없이 진행:', err);
      runAutoRecommend();
    });

  }).catch(function(err) {
    console.error('Firebase 로드 실패:', err);
    if (mainArea) {
      mainArea.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">판매량 파일을 업로드해주세요</div><div class="empty-desc">파일 업로드 후 자동으로 발주 추천 목록이 노출됩니다.</div></div>';
    }
  });
}

function saveToFirestore(fileName) {
  if (!window.firebaseDb) { console.log('Firebase 미연결'); return; }
  if (firestoreSaved) { console.log('이미 저장됨, 중복 저장 방지'); return; }
  firestoreSaved = true;
  try {
    // 파일명에서 날짜 추출 (예: 한달판매량(20260409).xlsx → 2026-04-09)
    var today = new Date();
    var yy = today.getFullYear();
    var mm = String(today.getMonth()+1).padStart(2,'0');
    var dd = String(today.getDate()).padStart(2,'0');
    var dateStr = yy + '-' + mm + '-' + dd; // 기본값: 오늘 날짜

    var dateMatch = fileName.match(/[(\[]?(\d{4})(\d{2})(\d{2})[)\]]?/);
    if (dateMatch) {
      dateStr = dateMatch[1] + '-' + dateMatch[2] + '-' + dateMatch[3];
      console.log('파일명에서 날짜 추출:', dateStr);
    } else {
      console.log('파일명에서 날짜 못찾음, 오늘 날짜 사용:', dateStr);
    }
    yy = dateStr.slice(0,4);
    mm = dateStr.slice(5,7);
    dd = dateStr.slice(8,10);
    var keys = Object.keys(globalDf[0] || {});
    var colName = keys.find(function(k) { return k.includes('상품명'); }) || '';
    var colOpt = keys.find(function(k) { return k.includes('옵션명'); }) || '';
    var colStock = keys.find(function(k) { return k.includes('현재고'); }) || '';

    // 당일 날짜 컬럼 찾기
    var todayShort = mm + '-' + dd;
    var todayFull = yy + '-' + mm + '-' + dd;
    var dateCols = keys.filter(function(k) {
      var clean = k.replace(/\n/g, '').trim();
      return clean.startsWith('2026-') && !clean.includes('판매량') && !clean.includes('~');
    });
    var todayCol = dateCols.find(function(k) {
      var clean = k.replace(/\n/g, '').trim();
      return clean === todayFull || clean.endsWith(todayShort);
    }) || '';
    if (!todayCol) {
      todayCol = dateCols[dateCols.length - 1] || '';
      console.log('오늘 날짜 컬럼 못찾음, 마지막 컬럼 사용:', todayCol);
    } else {
      console.log('오늘 날짜 컬럼 찾음:', todayCol);
    }

    // 상품코드별 전체 옵션 데이터 그룹화 (판매량 0 포함)
    var productMap = {};
    // N일 판매량 합계 컬럼 찾기 (~기호 포함된 판매량 컬럼)
    var col7d = keys.find(function(k) {
      return k.includes('~') && k.includes('판매');
    }) || keys.find(function(k) {
      return k.includes('판매량') && !k.match(/2026/);
    }) || '';

    globalDf.forEach(function(row) {
      var name = String(row[colName] || '').trim();
      var opt = String(row[colOpt] || '').trim();
      var todaySales = parseInt(row[todayCol]) || 0;
      var sales7d = parseInt(row[col7d]) || 0;
      var stock = parseInt(row[colStock]) || 0;
      if (!name || !opt) return;
      var code = extractCode(name) || name.slice(0,20);
      if (!productMap[code]) productMap[code] = { name: name, opts: [], allOpts: [] };
      productMap[code].allOpts.push(opt);
      productMap[code].opts.push({ opt: opt, sales: todaySales, sales7d: sales7d, stock: stock });
    });

    var codes = Object.keys(productMap);
    var dailySaved = 0;
    var productsSaved = 0;
    var chunkSize = 100;
    var delay = 500; // 청크 간 0.5초 간격

    function saveChunk(startIdx) {
      var chunk = codes.slice(startIdx, startIdx + chunkSize);
      if (chunk.length === 0) return;

      chunk.forEach(function(code) {
        var prod = productMap[code];

        // 1. daily_sales 컬렉션
        var optSales = {};
        var optStock = {};
        var optOrder = [];
        prod.opts.forEach(function(o) {
          optSales[o.opt] = o.sales;
          optStock[o.opt] = o.stock;
          optOrder.push(o.opt);
        });
        var docId = dateStr + '_' + code;

        window.firebaseSetDoc(
          window.firebaseDoc(window.firebaseDb, 'daily_sales', docId),
          {
            date: dateStr,
            code: code,
            productName: prod.name,
            fileName: fileName,
            uploadedAt: new Date().toISOString(),
            optSales: optSales,
            optStock: optStock,
            optOrder: optOrder
          }
        ).then(function() {
          dailySaved++;
          if (dailySaved === codes.length) {
            console.log('daily_sales 저장 완료! 총', dailySaved, '개 상품 (' + dateStr + ')');
          }
        }).catch(function(err) {
          console.error('daily_sales 저장 실패:', err);
        });

        // 2. products 컬렉션: 신규/변경사항 있을 때만 저장
        (function(codeRef, prodRef) {
          var prodSeason = globalSeason[prodRef.name] || '';
          var newOptsStr = JSON.stringify(prodRef.allOpts.slice().sort());
          window.firebaseGetDocs(
            window.firebaseQuery(
              window.firebaseCollection(window.firebaseDb, 'products'),
              window.firebaseWhere('code', '==', codeRef)
            )
          ).then(function(snap) {
            var needUpdate = false;
            if (snap.empty) {
              needUpdate = true;
              console.log('신규 상품:', codeRef);
            } else {
              var existing = snap.docs[0].data();
              var existOptsStr = JSON.stringify((existing.allOpts || []).slice().sort());
              if (existOptsStr !== newOptsStr || (existing.season || '') !== prodSeason) {
                needUpdate = true;
                console.log('상품 변경감지:', codeRef);
              }
            }
            if (needUpdate) {
              window.firebaseSetDoc(
                window.firebaseDoc(window.firebaseDb, 'products', codeRef),
                { code: codeRef, productName: prodRef.name, allOpts: prodRef.allOpts, season: prodSeason, updatedAt: new Date().toISOString() }
              ).then(function() {
                productsSaved++;
                if (productsSaved === codes.length) console.log('products 처리 완료!');
              }).catch(function(err) { console.error('products 저장 실패:', err); });
            } else {
              productsSaved++;
              if (productsSaved === codes.length) console.log('products 처리 완료!');
            }
          }).catch(function(err) { console.error('products 조회 실패:', err); });
        })(code, prod);
      });

      // 다음 청크 예약
      if (startIdx + chunkSize < codes.length) {
        setTimeout(function() {
          saveChunk(startIdx + chunkSize);
        }, delay);
      }
    }

    saveChunk(0); // 첫 청크 시작
  } catch(e) {
    console.error('저장 중 오류:', e);
  }
}

window.addEventListener('load', function() {
  var fi = document.getElementById('fileInput');
  var uz = document.getElementById('uploadZone');
  var pi = document.getElementById('productInput');
  if (fi) fi.addEventListener('change', function(e) { if (e.target.files[0]) loadFile(e.target.files[0]); });
  if (uz) uz.addEventListener('click', function() { fi && fi.click(); });
  if (uz) {
    uz.addEventListener('dragenter', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.add('drag'); });
    uz.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.add('drag'); });
    uz.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.remove('drag'); });
    uz.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.remove('drag'); var f=e.dataTransfer.files[0]; if(f) loadFile(f); });
  }
  if (pi) pi.addEventListener('input', function() { checkReady(); });
  switchMode('recommend');
});

function loadFile(file) {
  firestoreSaved = false; // 새 파일 업로드시 플래그 초기화
  const prog = document.getElementById('progressFill');
  prog.style.width = '30%';
  const reader = new FileReader();
  reader.onload = e => {
    prog.style.width = '70%';
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      // 시트명 공백 무시하고 '일별' 포함 시트 찾기
      const sheetName = wb.SheetNames.find(n => n.includes('일별'));
      if (!sheetName) { alert('일별 시트를 찾을 수 없습니다.'); prog.style.width='0%'; return; }
      const ws = wb.Sheets[sheetName];
      globalDf = XLSX.utils.sheet_to_json(ws, { defval: '' });
      // 일주일 판매량량 컬럼명에서 날짜 범위 추출
      if (globalDf.length > 0) {
        const keys = Object.keys(globalDf[0]);
        const col7d = keys.find(k => k.includes('~') && k.includes('판매')) || keys.find(k => k.includes('판매량') && !k.match(/2026/));
        if (col7d) {
          const m = col7d.match(/\((\d+\.\d+\.\d+)~(\d+\.\d+\.\d+)\)/);
          if (m) {
            global7dLabel = '일주일 판매량량\n(' + m[1] + '~' + m[2] + ')';
          }
        }
      }
      // 품절여부 시트 읽기 (시트명 무관, 품절여부 컬럼 있는 시트 자동 탐색)
      globalSoldOut = {};
      globalSeason = {};
      for (const sName of wb.SheetNames) {
        const sData = XLSX.utils.sheet_to_json(wb.Sheets[sName], { defval: '' });
        if (sData.length > 0 && '품절여부' in sData[0]) {
          sData.forEach(row => {
            const prodName = String(row['상품명'] || '').trim();
            const optName  = String(row['옵션명'] || '').trim();
            const soldOut  = String(row['품절여부'] || '').trim();
            const season   = String(row['사입상품명'] || '').trim();
            const key = prodName + '||' + optName;
            globalSoldOut[key] = soldOut;
            // 상품명 기준 시즌 (첫 번째 옵션 기준)
            if (!globalSeason[prodName]) globalSeason[prodName] = season;
          });
          break;
        }
      }
      prog.style.width = '100%';
      setTimeout(() => prog.style.width = '0%', 800);

      document.getElementById('fileLoaded').style.display = 'block';
      document.getElementById('fileLoaded').textContent = '✓ ' + file.name;
      window._lastFileName = file.name;
      var wrap = document.getElementById('firebaseSaveWrap');
      if (wrap) wrap.style.display = 'block';
      var status = document.getElementById('firebaseSaveStatus');
      if (status) status.textContent = '';
      document.getElementById('fileStatus').textContent = globalDf.length.toLocaleString() + '행 로드됨';
      document.getElementById('fileStatus').className = 'status-pill active';
      // 파일 로드 완료 → 자동 추천 실행
      runAutoRecommend();
    } catch(err) {
      alert('파일 로드 실패: ' + err.message);
      prog.style.width = '0%';
    }
  };
  reader.readAsArrayBuffer(file);
}

function runAutoRecommend() {
  if (!globalDf) return;

  // 컬럼 찾기
  const keys = Object.keys(globalDf[0] || {});
  const colName = keys.find(k => k.includes('상품명')) || '';
  const colStock = keys.find(k => k.includes('현재고')) || '';
  const col7d = keys.find(k => k.includes('~') && k.includes('판매')) || keys.find(k => k.includes('판매량') && !k.match(/2026/)) || '';
  const colOpt = keys.find(k => k.includes('옵션명')) || '';

  if (!colName || !colStock || !col7d) return;

  // 전체 데이터에서 발주 필요 옵션 추출
  const candidates = [];
  const codeMap = {};

  let rowIdx = 0;
  globalDf.forEach(function(row) {
    const code = extractCode(String(row[colName] || ''));
    if (!code) return;
    if (!codeMap[code]) codeMap[code] = { name: String(row[colName] || ''), opts: [], order: rowIdx };
    codeMap[code].opts.push({ row: row, idx: rowIdx });
    rowIdx++;
  });

  Object.keys(codeMap).forEach(function(code) {
    const item = codeMap[code];
    const prodName = item.name;
    const season = globalSeason[prodName] || '';
    const isSeasonY = !!(season && season.includes('(Y)'));

    // 발주 필요 옵션이 하나라도 있는지 먼저 체크
    let hasNeed = false;
    const allOpts = [];

    // 원래 순서 유지
    item.opts.sort(function(a, b) { return a.idx - b.idx; });
    item.opts.forEach(function(rowObj) {
      const row = rowObj.row;
      const stock = parseInt(row[colStock]) || 0;
      const s7d = parseInt(row[col7d]) || 0;
      const criteria = Math.ceil(s7d * globalMulti);
      const optName = String(row[colOpt] || '');
      const soldOutKey = prodName + '||' + optName;
      const soldOut = globalSoldOut[soldOutKey] || '';
      const isSoldOut = soldOut === '품절' || soldOut === '일시품절';
      const isNeed = !isSoldOut && stock < criteria && criteria > 0;

      if (isNeed) hasNeed = true;

      allOpts.push({
        code, product: prodName, season, isSeasonY,
        opt: optName, stock, s7d, criteria,
        shortage: isNeed ? criteria - stock : 0,
        isZeroStock: stock === 0,
        soldOut, isNeed, isSoldOut,
        rowIdx: rowObj.idx
      });
    });

    // 발주 필요 옵션이 하나라도 있으면 상품 전체 옵션 추가
    if (hasNeed) {
      allOpts.forEach(function(o) { candidates.push(o); });
    }
  });

  // 정렬
  candidates.sort(function(a, b) {
    if (b.isSeasonY !== a.isSeasonY) return (b.isSeasonY ? 1 : 0) - (a.isSeasonY ? 1 : 0);
    if (b.s7d !== a.s7d) return b.s7d - a.s7d;
    if (b.shortage !== a.shortage) return b.shortage - a.shortage;
    return (b.isZeroStock ? 1 : 0) - (a.isZeroStock ? 1 : 0);
  });

  renderRecommend(candidates);
}

function renderRecommend(candidates) {
  const mainArea = document.getElementById('mainArea');

  // 시즌 목록 추출
  const seasonKeys = {};
  candidates.forEach(function(c) { if (c.season) seasonKeys[c.season] = true; });
  const seasonList = Object.keys(seasonKeys).sort();

  mainArea.innerHTML = '';
  recCurrentSeason = '';

  // ── 1. 시즌 필터 탭 ──
  const filterDiv = document.createElement('div');
  filterDiv.style.cssText = 'display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;';

  function applySeasonFilter(season, btn) {
    recCurrentSeason = season;
    filterDiv.querySelectorAll('button').forEach(function(b) {
      const bc = b.dataset.color || '#2563eb';
      const bg = b.dataset.bg || '#eff6ff';
      if (b === btn) { b.style.background = bc; b.style.color = '#fff'; b.style.borderColor = bc; }
      else { b.style.background = bg; b.style.color = bc; b.style.borderColor = bc; }
    });
    const filtered = season ? candidates.filter(function(c) { return c.season === season; }) : candidates;
    updateStats(filtered, season);
    renderTable(filtered);
  }

  const allNeedCount = candidates.filter(function(c) { return c.isNeed; }).length;
  const allBtn = document.createElement('button');
  allBtn.textContent = '전체 (' + allNeedCount + ')';
  allBtn.dataset.color = '#2563eb';
  allBtn.dataset.bg = '#eff6ff';
  allBtn.style.cssText = 'padding:6px 12px;font-size:12px;font-weight:600;border:1px solid #2563eb;border-radius:20px;background:#2563eb;color:#fff;cursor:pointer;white-space:nowrap;font-family:Noto Sans KR,sans-serif;';
  allBtn.onclick = function() { applySeasonFilter('', allBtn); };
  filterDiv.appendChild(allBtn);

  seasonList.forEach(function(s) {
    const cnt = candidates.filter(function(c) { return c.season === s && c.isNeed; }).length;
    const color = s.includes('(Y)') ? '#16a34a' : s.includes('(OFF)') ? '#d97706' : s.includes('(N)') ? '#9ca3af' : '#2563eb';
    const bg = s.includes('(Y)') ? '#f0fdf4' : s.includes('(OFF)') ? '#fffbeb' : s.includes('(N)') ? '#f3f4f6' : '#eff6ff';
    const btn = document.createElement('button');
    btn.textContent = s + ' (' + cnt + ')';
    btn.dataset.color = color;
    btn.dataset.bg = bg;
    btn.style.cssText = 'padding:6px 12px;font-size:12px;font-weight:600;border:1px solid '+color+';border-radius:20px;background:'+bg+';color:'+color+';cursor:pointer;white-space:nowrap;font-family:Noto Sans KR,sans-serif;';
    btn.onclick = (function(season, b) { return function() { applySeasonFilter(season, b); }; })(s, btn);
    filterDiv.appendChild(btn);
  });
  mainArea.appendChild(filterDiv);

  // ── 2. 안정재고 배수 ──
  const multiWrap = document.createElement('div');
  multiWrap.style.cssText = 'display:flex;align-items:center;gap:8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 14px;margin-bottom:14px;';
  multiWrap.innerHTML = '<span style="font-size:12px;color:#1e40af;font-weight:500;">안정재고 기준</span>'
    + '<span style="font-size:12px;color:#374151;">일주일 판매량</span>'
    + '<span style="font-size:12px;color:#374151;">×</span>';
  const multiInp = document.createElement('input');
  multiInp.type = 'number';
  multiInp.value = globalMulti;
  multiInp.min = '0.5'; multiInp.max = '10'; multiInp.step = '0.5';
  multiInp.style.cssText = 'width:52px;padding:3px 6px;border:1px solid #93c5fd;border-radius:4px;font-size:13px;font-weight:700;color:#1d4ed8;text-align:center;';
  multiInp.oninput = function() {
    const v = parseFloat(this.value);
    if (!isNaN(v) && v > 0) {
      globalMulti = v;
      const mi = document.getElementById('multiInput');
      const ms = document.getElementById('multiSlider');
      if (mi) mi.value = v;
      if (ms) ms.value = Math.min(Math.max(v,1),5);
      runAutoRecommend();
    }
  };
  multiWrap.appendChild(multiInp);
  multiWrap.innerHTML += '<span style="font-size:12px;color:#374151;">= 안정재고</span>';
  multiWrap.insertBefore(multiInp, multiWrap.lastChild);
  mainArea.appendChild(multiWrap);

  // ── 3. 통계 카드 ──
  const statsDiv = document.createElement('div');
  statsDiv.id = 'recStatsDiv';
  statsDiv.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;';

  function updateStats(filteredCandidates, seasonLabel) {
    const needOpts = filteredCandidates.filter(function(c) { return c.isNeed; }).length;
    const allNeedOpts = candidates.filter(function(c) { return c.isNeed; }).length;

    // 상품 단위 계산
    const prodMap = {};
    filteredCandidates.forEach(function(c) { if (!prodMap[c.code]) prodMap[c.code] = { hasNeed: false, hasOk: false }; if (c.isNeed) prodMap[c.code].hasNeed = true; else prodMap[c.code].hasOk = true; });
    const allProdMap = {};
    candidates.forEach(function(c) { if (!allProdMap[c.code]) allProdMap[c.code] = true; });

    const needProds = Object.values(prodMap).filter(function(p) { return p.hasNeed; }).length;
    const okProds = Object.values(prodMap).filter(function(p) { return !p.hasNeed; }).length;
    const totalProds = Object.keys(allProdMap).length;

    statsDiv.innerHTML = '';
    [
      { label: '발주필요 옵션', val: allNeedOpts, color: '#dc2626' },
      { label: '발주필요 상품', val: needProds, color: '#ea580c' },
      { label: '재고 충분', val: okProds, color: '#16a34a' },
      { label: '총 상품코드', val: totalProds, color: '#2563eb' }
    ].forEach(function(s) {
      const card = document.createElement('div');
      card.style.cssText = 'background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;';
      card.innerHTML = '<div style="font-size:11px;color:#9ca3af;margin-bottom:6px;">'+s.label+'</div>'
        + '<div style="font-size:24px;font-weight:700;color:'+s.color+';font-family:monospace;">'+s.val+'</div>';
      statsDiv.appendChild(card);
    });
  }

  updateStats(candidates, '');
  mainArea.appendChild(statsDiv);

  // ── 4. 툴바 (전체펼치기/접기 + 상태탭 + 엑셀저장) ──
  const toolbarDiv = document.createElement('div');
  toolbarDiv.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';

  const expBtn = document.createElement('button');
  expBtn.textContent = '﹢ 전체 펼치기';
  expBtn.style.cssText = 'padding:6px 12px;font-size:12px;font-weight:500;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#6b7280;cursor:pointer;font-family:Noto Sans KR,sans-serif;';
  expBtn.onclick = function() {
    document.querySelectorAll('#recTableWrap .rec-body').forEach(function(el) { el.style.display = 'block'; });
    document.querySelectorAll('#recTableWrap .rec-chev').forEach(function(el) { el.textContent = '▼'; });
  };

  const colBtn = document.createElement('button');
  colBtn.textContent = '﹣ 전체 접기';
  colBtn.style.cssText = 'padding:6px 12px;font-size:12px;font-weight:500;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#6b7280;cursor:pointer;font-family:Noto Sans KR,sans-serif;';
  colBtn.onclick = function() {
    document.querySelectorAll('#recTableWrap .rec-body').forEach(function(el) { el.style.display = 'none'; });
    document.querySelectorAll('#recTableWrap .rec-chev').forEach(function(el) { el.textContent = '▶'; });
  };

  // 상태 탭 (전체/발주필요/재고충분)
  const statusTabDiv = document.createElement('div');
  statusTabDiv.style.cssText = 'display:flex;gap:4px;';
  [
    { label: '전체', val: 'all' },
    { label: '발주필요', val: 'need' },
    { label: '재고충분', val: 'ok' }
  ].forEach(function(t) {
    const tb = document.createElement('button');
    tb.textContent = t.label;
    tb.style.cssText = 'padding:5px 12px;font-size:12px;font-weight:600;border:1px solid '+(t.val==='all'?'#2563eb':'#e5e7eb')+';border-radius:20px;background:'+(t.val==='all'?'#2563eb':'#f9fafb')+';color:'+(t.val==='all'?'#fff':'#6b7280')+';cursor:pointer;font-family:Noto Sans KR,sans-serif;';
    tb.onclick = function() {
      statusTabDiv.querySelectorAll('button').forEach(function(b) {
        b.style.background='#f9fafb'; b.style.color='#6b7280'; b.style.borderColor='#e5e7eb';
      });
      tb.style.background='#2563eb'; tb.style.color='#fff'; tb.style.borderColor='#2563eb';
      document.querySelectorAll('#recTableWrap .rec-card').forEach(function(card) {
        var status = card.dataset.status || 'ok';
        card.style.display = (t.val==='all' || status===t.val) ? '' : 'none';
      });
    };
    statusTabDiv.appendChild(tb);
  });

  // 엑셀 저장
  const dlWrap = document.createElement('div');
  dlWrap.style.cssText = 'position:relative;margin-left:auto;';
  const dlBtn = document.createElement('button');
  dlBtn.textContent = '⬇ 엑셀 저장 ▾';
  dlBtn.style.cssText = 'padding:7px 14px;font-size:12px;font-weight:600;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;cursor:pointer;font-family:Noto Sans KR,sans-serif;';
  dlBtn.onclick = function(e) {
    e.stopPropagation();
    const menu = dlWrap.querySelector('.rec-dl-menu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    setTimeout(function() {
      document.addEventListener('click', function close() {
        menu.style.display = 'none';
        document.removeEventListener('click', close);
      });
    }, 0);
  };
  const dlMenu = document.createElement('div');
  dlMenu.className = 'rec-dl-menu';
  dlMenu.style.cssText = 'display:none;position:absolute;right:0;top:36px;background:#fff;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.15);';
  [
    { label: '📋 현재 목록', mode: 'current' },
    { label: '📋 전체 (모든 시즌)', mode: 'all' }
  ].forEach(function(item) {
    const opt = document.createElement('div');
    opt.textContent = item.label;
    opt.style.cssText = 'padding:10px 16px;font-size:13px;cursor:pointer;color:#111827;font-family:Noto Sans KR,sans-serif;border-bottom:0.5px solid #f3f4f6;';
    opt.onmouseover = function() { opt.style.background = '#f9fafb'; };
    opt.onmouseout = function() { opt.style.background = ''; };
    opt.onclick = function() { dlMenu.style.display='none'; downloadRecExcel(item.mode, candidates); };
    dlMenu.appendChild(opt);
  });
  dlWrap.appendChild(dlBtn);
  dlWrap.appendChild(dlMenu);

  toolbarDiv.appendChild(expBtn);
  toolbarDiv.appendChild(colBtn);
  toolbarDiv.appendChild(statusTabDiv);
  toolbarDiv.appendChild(dlWrap);
  mainArea.appendChild(toolbarDiv);

  // ── 5. 테이블 ──
  const tableWrap = document.createElement('div');
  tableWrap.id = 'recTableWrap';
  mainArea.appendChild(tableWrap);

  function renderTable(data) {
    const wrap = document.getElementById('recTableWrap');
    if (!data.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">해당 시즌 발주 필요 없음</div></div>';
      return;
    }

    // 상품별 그룹화
    const prodMap = {};
    data.forEach(function(c) {
      if (!prodMap[c.code]) prodMap[c.code] = { code: c.code, product: c.product, season: c.season, isSeasonY: c.isSeasonY, opts: [], firstIdx: c.rowIdx };
      prodMap[c.code].opts.push(c);
    });
    // 상품 카드 순서는 정렬 기준 유지, 옵션만 원래 순서로
    const prods = Object.values(prodMap);
    prods.forEach(function(prod) {
      prod.opts.sort(function(a, b) { return a.rowIdx - b.rowIdx; });
    });

    wrap.innerHTML = '';
    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

    prods.forEach(function(prod, idx) {
      const seasonColor = prod.isSeasonY ? '#16a34a' : prod.season && prod.season.includes('(OFF)') ? '#d97706' : '#9ca3af';
      const seasonBg = prod.isSeasonY ? '#f0fdf4' : prod.season && prod.season.includes('(OFF)') ? '#fffbeb' : '#f3f4f6';
      const totalShortage = prod.opts.reduce(function(s,o){ return s+o.shortage; }, 0);
      const maxS7d = Math.max.apply(null, prod.opts.map(function(o){ return o.s7d; }));

      // 카드
      const card = document.createElement('div');
      card.className = 'rec-card';
      card.dataset.name = (prod.name || '').toLowerCase();
      card.dataset.status = prod.opts.some(function(o){ return o.status==='need'; }) ? 'need' : 'ok';
      card.style.cssText = 'background:#fff;border:1px solid #fecaca;border-radius:10px;overflow:hidden;';

      // 헤더
      const header = document.createElement('div');
      header.style.cssText = 'padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;';
      header.onclick = function() {
        const body = card.querySelector('.rec-body');
        const chev = card.querySelector('.rec-chev');
        const open = body.style.display !== 'none';
        body.style.display = open ? 'none' : 'block';
        chev.textContent = open ? '▶' : '▼';
      };

      const codeSpan = document.createElement('span');
      codeSpan.textContent = prod.code;
      codeSpan.style.cssText = 'font-family:monospace;font-size:11px;color:#2563eb;background:#eff6ff;padding:2px 8px;border-radius:4px;white-space:nowrap;';

      const seasonSpan = document.createElement('span');
      seasonSpan.textContent = prod.season || '-';
      seasonSpan.style.cssText = 'font-size:10px;padding:2px 8px;border-radius:10px;background:'+seasonBg+';color:'+seasonColor+';font-weight:600;white-space:nowrap;';

      const nameSpan = document.createElement('span');
      nameSpan.textContent = prod.product;
      nameSpan.style.cssText = 'font-size:13px;font-weight:500;flex:1;';

      const totalOpts = prod.opts.length;
      const needOpts = prod.opts.filter(function(o) { return o.isNeed; }).length;
      const needCount = document.createElement('span');
      needCount.textContent = '▲ ' + totalOpts + '/' + needOpts + '옵션';
      needCount.style.cssText = 'font-size:11px;color:#dc2626;white-space:nowrap;';

      const badge = document.createElement('span');
      badge.textContent = '발주 필요';
      badge.style.cssText = 'font-size:10px;padding:2px 8px;border-radius:20px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-weight:600;white-space:nowrap;';

      const chev = document.createElement('span');
      chev.className = 'rec-chev';
      chev.textContent = '▼';
      chev.style.cssText = 'font-size:10px;color:#9ca3af;';

      header.appendChild(codeSpan);
      header.appendChild(seasonSpan);
      header.appendChild(nameSpan);
      header.appendChild(needCount);
      header.appendChild(badge);
      header.appendChild(chev);

      // 옵션 테이블
      const body = document.createElement('div');
      body.className = 'rec-body';
      body.style.cssText = 'border-top:1px solid #e5e7eb;';

      const table = document.createElement('table');
      table.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;';

      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      hrow.style.cssText = 'background:#f9fafb;';
      [{h:'옵션',align:'left'},{h:'현재고',align:'right'},{h:'일주일 판매량',align:'right'},{h:'안정재고',align:'right'},{h:'부족수량',align:'right'},{h:'판단',align:'center'}].forEach(function(col) {
        const th = document.createElement('th');
        th.textContent = col.h;
        th.style.cssText = 'padding:5px 8px;font-size:11px;color:#6b7280;font-weight:600;text-align:'+col.align+';border-bottom:1px solid #e5e7eb;white-space:nowrap;';
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);

      const tbody = document.createElement('tbody');
      prod.opts.forEach(function(o) {
        const tr = document.createElement('tr');
        const rowBg = o.isSoldOut ? '#f9fafb' : o.isNeed ? '#fff8f8' : '#ffffff';
        tr.style.cssText = 'border-bottom:1px solid #f3f4f6;background:'+rowBg+';height:28px;';

        // 옵션명 + 상태 배지
        const tdOpt = document.createElement('td');
        tdOpt.style.cssText = 'padding:7px 12px;';
        tdOpt.style.cssText = 'padding:4px 8px;';
        const optText = document.createElement('span');
        optText.textContent = o.opt;
        optText.style.cssText = 'font-size:11px;color:' + (o.isSoldOut?'#9ca3af':o.isNeed?'#374151':'#6b7280') + ';';
        tdOpt.appendChild(optText);
        if (o.isSoldOut) {
          const badge = document.createElement('span');
          badge.textContent = o.soldOut;
          badge.style.cssText = 'margin-left:6px;font-size:10px;padding:1px 6px;border-radius:10px;background:'+(o.soldOut==='품절'?'#fef2f2':'#fffbeb')+';color:'+(o.soldOut==='품절'?'#dc2626':'#d97706')+';font-weight:600;';
          tdOpt.appendChild(badge);
        } else if (!o.isNeed) {
          const badge = document.createElement('span');
          badge.textContent = '충분';
          badge.style.cssText = 'margin-left:6px;font-size:10px;padding:1px 6px;border-radius:10px;background:#f0fdf4;color:#16a34a;font-weight:600;';
          tdOpt.appendChild(badge);
        }
        tr.appendChild(tdOpt);

        // 현재고
        const tdStock = document.createElement('td');
        tdStock.textContent = String(o.stock);
        tdStock.style.cssText = 'padding:4px 8px;text-align:right;font-family:monospace;font-size:11px;'+(o.stock===0&&o.isNeed?'color:#dc2626;font-weight:600;':o.isSoldOut?'color:#9ca3af;':'');
        tr.appendChild(tdStock);

        // 일주일 판매량
        const tdS7d = document.createElement('td');
        tdS7d.textContent = String(o.s7d);
        tdS7d.style.cssText = 'padding:4px 8px;text-align:right;font-family:monospace;font-size:11px;color:'+(o.isSoldOut?'#9ca3af':'#374151')+';';
        tr.appendChild(tdS7d);

        // 안정재고
        const tdCriteria = document.createElement('td');
        tdCriteria.textContent = String(o.criteria);
        tdCriteria.style.cssText = 'padding:4px 8px;text-align:right;font-family:monospace;font-size:11px;color:#6b7280;';
        tr.appendChild(tdCriteria);

        // 부족수량
        const tdShort = document.createElement('td');
        tdShort.textContent = o.isNeed ? String(o.shortage) : '-';
        tdShort.style.cssText = 'padding:4px 8px;text-align:right;font-family:monospace;font-size:11px;'+(o.isNeed?'color:#dc2626;font-weight:600;':'color:#9ca3af;');
        tr.appendChild(tdShort);

        // 판단 배지
        const tdJudge = document.createElement('td');
        tdJudge.style.cssText = 'padding:4px 8px;text-align:center;';
        const judgeSpan = document.createElement('span');
        if (o.isSoldOut) {
          judgeSpan.textContent = o.soldOut;
          judgeSpan.style.cssText = 'font-size:10px;padding:1px 6px;border-radius:10px;background:'+(o.soldOut==='품절'?'#fef2f2':'#fffbeb')+';color:'+(o.soldOut==='품절'?'#dc2626':'#d97706')+';font-weight:600;';
        } else if (o.isNeed) {
          judgeSpan.textContent = '발주필요';
          judgeSpan.style.cssText = 'font-size:10px;padding:1px 6px;border-radius:10px;background:#fef2f2;color:#dc2626;font-weight:600;';
        } else {
          judgeSpan.textContent = '충분';
          judgeSpan.style.cssText = 'font-size:10px;padding:1px 6px;border-radius:10px;background:#f0fdf4;color:#16a34a;font-weight:600;';
        }
        tdJudge.appendChild(judgeSpan);
        tr.appendChild(tdJudge);

        tbody.appendChild(tr);
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      body.appendChild(table);

      card.appendChild(header);
      card.appendChild(body);
      list.appendChild(card);
    });

    wrap.appendChild(list);
  }

  renderTable(candidates);
}
