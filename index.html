<script>
let globalDf = null;
let global7dLabel = '';
let globalMulti = 2;
let globalSoldOut = {};
let globalSeason = {};
let currentSeason = '';
let currentMode = 'recommend'; // recommend | check
let allResults = [];
let currentTab = 'all';
let recCurrentSeason = '';

// ── 파일 업로드 ──
function saveToFirestore(fileName) {
  if (!window.firebaseDb) { console.log('Firebase 미연결'); return; }
  try {
    var today = new Date();
    var yy = today.getFullYear();
    var mm = String(today.getMonth()+1).padStart(2,'0');
    var dd = String(today.getDate()).padStart(2,'0');
    var dateStr = yy + '-' + mm + '-' + dd;
    var keys = Object.keys(globalDf[0] || {});
    var colName = keys.find(function(k) { return k.includes('상품명'); }) || '';
    var colOpt = keys.find(function(k) { return k.includes('옵션명'); }) || '';
    var colStock = keys.find(function(k) { return k.includes('현재고'); }) || '';

    // 당일 날짜 컬럼 찾기
    var todayShort = mm + '-' + dd;
    var todayFull = yy + '-' + mm + '-' + dd;
    var dateCols = keys.filter(function(k) {
      var clean = k.replace(/\n/g, '').trim();
      return clean.startsWith('2026-') && !clean.includes('판매량') && !clean.includes('~');
    });
    var todayCol = dateCols.find(function(k) {
      var clean = k.replace(/\n/g, '').trim();
      return clean === todayFull || clean.endsWith(todayShort);
    }) || '';
    if (!todayCol) {
      todayCol = dateCols[dateCols.length - 1] || '';
      console.log('오늘 날짜 컬럼 못찾음, 마지막 컬럼 사용:', todayCol);
    } else {
      console.log('오늘 날짜 컬럼 찾음:', todayCol);
    }

    // 상품코드별 전체 옵션 데이터 그룹화 (판매량 0 포함)
    var productMap = {};
    globalDf.forEach(function(row) {
      var name = String(row[colName] || '').trim();
      var opt = String(row[colOpt] || '').trim();
      var todaySales = parseInt(row[todayCol]) || 0;
      var stock = parseInt(row[colStock]) || 0;
      if (!name || !opt) return;
      var code = extractCode(name) || name.slice(0,20);
      if (!productMap[code]) productMap[code] = { name: name, opts: [], allOpts: [] };
      // 전체 옵션 목록 (판매량 0 포함)
      productMap[code].allOpts.push(opt);
      // 당일 판매량
      productMap[code].opts.push({ opt: opt, sales: todaySales, stock: stock });
    });

    var codes = Object.keys(productMap);
    var dailySaved = 0;
    var productsSaved = 0;

    codes.forEach(function(code) {
      var prod = productMap[code];

      // 1. daily_sales 컬렉션: 당일 판매량 저장 (전체 옵션 포함, 판매량 0도 포함)
      var optSales = {};
      prod.opts.forEach(function(o) { optSales[o.opt] = o.sales; });

      window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, 'daily_sales'), {
        date: dateStr,
        code: code,
        productName: prod.name,
        fileName: fileName,
        uploadedAt: new Date().toISOString(),
        optSales: optSales
      }).then(function() {
        dailySaved++;
        if (dailySaved === codes.length) {
          console.log('daily_sales 저장 완료! 총', dailySaved, '개 상품 (' + dateStr + ')');
        }
      }).catch(function(err) {
        console.error('daily_sales 저장 실패:', err);
      });

      // 2. products 컬렉션: 전체 옵션 목록 저장 (최신 상태 유지)
      var { setDoc, doc } = window.firebaseSetDoc
        ? { setDoc: window.firebaseSetDoc, doc: window.firebaseDoc }
        : { setDoc: null, doc: null };

      if (window.firebaseSetDoc && window.firebaseDoc) {
        window.firebaseSetDoc(
          window.firebaseDoc(window.firebaseDb, 'products', code),
          {
            code: code,
            productName: prod.name,
            allOpts: prod.allOpts,
            updatedAt: new Date().toISOString()
          }
        ).then(function() {
          productsSaved++;
          if (productsSaved === codes.length) {
            console.log('products 저장 완료! 총', productsSaved, '개 상품');
          }
        }).catch(function(err) {
          console.error('products 저장 실패:', err);
        });
      }
    });
  } catch(e) {
    console.error('저장 중 오류:', e);
  }
}

window.addEventListener('load', function() {
  var fi = document.getElementById('fileInput');
  var uz = document.getElementById('uploadZone');
  var pi = document.getElementById('productInput');
  if (fi) fi.addEventListener('change', function(e) { if (e.target.files[0]) loadFile(e.target.files[0]); });
  if (uz) uz.addEventListener('click', function() { fi && fi.click(); });
  if (uz) {
    uz.addEventListener('dragenter', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.add('drag'); });
    uz.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.add('drag'); });
    uz.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.remove('drag'); });
    uz.addEventListener('drop', function(e) { e.preventDefault(); e.stopPropagation(); uz.classList.remove('drag'); var f=e.dataTransfer.files[0]; if(f) loadFile(f); });
  }
  if (pi) pi.addEventListener('input', function() { checkReady(); });

});

function loadFile(file) {
  const prog = document.getElementById('progressFill');
  prog.style.width = '30%';
  const reader = new FileReader();
  reader.onload = e => {
    prog.style.width = '70%';
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      // 시트명 공백 무시하고 '일별' 포함 시트 찾기
      const sheetName = wb.SheetNames.find(n => n.includes('일별'));
      if (!sheetName) { alert('일별 시트를 찾을 수 없습니다.'); prog.style.width='0%'; return; }
      const ws = wb.Sheets[sheetName];
      globalDf = XLSX.utils.sheet_to_json(ws, { defval: '' });
      // 7일 판매량 컬럼명에서 날짜 범위 추출
      if (globalDf.length > 0) {
        const keys = Object.keys(globalDf[0]);
        const col7d = keys.find(k => k.includes('판매량') || (k.includes('판매') && !k.includes('상품명')));
        if (col7d) {
          const m = col7d.match(/\((\d+\.\d+\.\d+)~(\d+\.\d+\.\d+)\)/);
          if (m) {
            global7dLabel = '7일 판매량\n(' + m[1] + '~' + m[2] + ')';
          }
        }
      }
      // 품절여부 시트 읽기 (시트명 무관, 품절여부 컬럼 있는 시트 자동 탐색)
      globalSoldOut = {};
      globalSeason = {};
      for (const sName of wb.SheetNames) {
        const sData = XLSX.utils.sheet_to_json(wb.Sheets[sName], { defval: '' });
        if (sData.length > 0 && '품절여부' in sData[0]) {
          sData.forEach(row => {
            const prodName = String(row['상품명'] || '').trim();
            const optName  = String(row['옵션명'] || '').trim();
            const soldOut  = String(row['품절여부'] || '').trim();
            const season   = String(row['사입상품명'] || '').trim();
            const key = prodName + '||' + optName;
            globalSoldOut[key] = soldOut;
            // 상품명 기준 시즌 (첫 번째 옵션 기준)
            if (!globalSeason[prodName]) globalSeason[prodName] = season;
          });
          break;
        }
      }
      prog.style.width = '100%';
      setTimeout(() => prog.style.width = '0%', 800);

      document.getElementById('fileLoaded').style.display = 'block';
      document.getElementById('fileLoaded').textContent = '✓ ' + file.name;
      document.getElementById('fileStatus').textContent = globalDf.length.toLocaleString() + '행 로드됨';
      document.getElementById('fileStatus').className = 'status-pill active';
      // 파일 로드 완료 → 자동 추천 실행
      runAutoRecommend();
      // Firestore에 날짜별 데이터 저장
      saveToFirestore(file.name);
    } catch(err) {
      alert('파일 로드 실패: ' + err.message);
      prog.style.width = '0%';
    }
  };
  reader.readAsArrayBuffer(file);
}

function runAutoRecommend() {
  if (!globalDf) return;

  // 컬럼 찾기
  const keys = Object.keys(globalDf[0] || {});
  const colName = keys.find(k => k.includes('상품명')) || '';
  const colStock = keys.find(k => k.includes('현재고')) || '';
  const col7d = keys.find(k => k.includes('판매량') || (k.includes('판매') && !k.includes('상품명'))) || '';
  const colOpt = keys.find(k => k.includes('옵션명')) || '';

  if (!colName || !colStock || !col7d) return;

  // 전체 데이터에서 발주 필요 옵션 추출
  const candidates = [];
  const codeMap = {};

  let rowIdx = 0;
  globalDf.forEach(function(row) {
    const code = extractCode(String(row[colName] || ''));
    if (!code) return;
    if (!codeMap[code]) codeMap[code] = { name: String(row[colName] || ''), opts: [], order: rowIdx };
    codeMap[code].opts.push({ row: row, idx: rowIdx });
    rowIdx++;
  });

  Object.keys(codeMap).forEach(function(code) {
    const item = codeMap[code];
    const prodName = item.name;
    const season = globalSeason[prodName] || '';
    const isSeasonY = !!(season && season.includes('(Y)'));

    // 발주 필요 옵션이 하나라도 있는지 먼저 체크
    let hasNeed = false;
    const allOpts = [];

    // 원래 순서 유지
    item.opts.sort(function(a, b) { return a.idx - b.idx; });
    item.opts.forEach(function(rowObj) {
      const row = rowObj.row;
      const stock = parseInt(row[colStock]) || 0;
      const s7d = parseInt(row[col7d]) || 0;
      const criteria = Math.ceil(s7d * globalMulti);
      const optName = String(row[colOpt] || '');
      const soldOutKey = prodName + '||' + optName;
      const soldOut = globalSoldOut[soldOutKey] || '';
      const isSoldOut = soldOut === '품절' || soldOut === '일시품절';
      const isNeed = !isSoldOut && stock < criteria && criteria > 0;

      if (isNeed) hasNeed = true;

      allOpts.push({
        code, product: prodName, season, isSeasonY,
        opt: optName, stock, s7d, criteria,
        shortage: isNeed ? criteria - stock : 0,
        isZeroStock: stock === 0,
        soldOut, isNeed, isSoldOut,
        rowIdx: rowObj.idx
      });
    });

    // 발주 필요 옵션이 하나라도 있으면 상품 전체 옵션 추가
    if (hasNeed) {
      allOpts.forEach(function(o) { candidates.push(o); });
    }
  });

  // 정렬
  candidates.sort(function(a, b) {
    if (b.isSeasonY !== a.isSeasonY) return (b.isSeasonY ? 1 : 0) - (a.isSeasonY ? 1 : 0);
    if (b.s7d !== a.s7d) return b.s7d - a.s7d;
    if (b.shortage !== a.shortage) return b.shortage - a.shortage;
    return (b.isZeroStock ? 1 : 0) - (a.isZeroStock ? 1 : 0);
  });

  renderRecommend(candidates);
}

function parseColorSize(optStr) {
  let color = '', size = '';
  const cm1 = optStr.match(/색상[:\s]*([^,\s\[\-\(]+)/);
  const sm1 = optStr.match(/사이즈[:\s]*([^\s,\]\[\(]+)/);
  if (cm1 && sm1) {
    color = cm1[1].replace(/[()[\]\-]/g,'').trim();
    size  = sm1[1].replace(/[()[\]\-]/g,'').trim();
  } else {
    const cm2 = optStr.match(/^-?([^(,\[]+)\(/);
    const sm2 = optStr.match(/\[([^\]]+)\]/);
    if (cm2 && sm2) {
      color = cm2[1].replace(/^-+/,'').trim();
      size  = sm2[1].trim();
    } else {
      color = optStr.split(',')[0].replace(/[-[\]]/g,'').trim();
    }
  }
  return { color, size };
}

function extractCode(s) {
  s = String(s).split('//')[0].trim();
  // 코드만 단독 입력 (예: KJST2619)
  if (/^[A-Z]{2,5}\d{4,}$/.test(s)) return s;
  // 코드 포함된 문자열에서 추출
  const m = s.match(/[A-Z]{2,5}\d{4,}/g);
  return m ? m[m.length - 1] : null;
}

// ── 분석 ──
function analyze() {
  if (!globalDf) { alert('판매량 파일을 먼저 업로드해주세요.'); return; }
  const inputVal = document.getElementById('productInput').value.trim();
  if (!inputVal) { alert('상품 리스트를 입력해주세요.'); return; }
  const lines = document.getElementById('productInput').value.trim().split('\n').map(l => l.trim()).filter(Boolean);

  // 헤더 키 찾기 (공백/줄바꿈 포함)
  const sampleRow = globalDf[0] || {};
  const keys = Object.keys(sampleRow);
  const colName = keys.find(k => k.includes('상품명')) || '';
  const colStock = keys.find(k => k.includes('현재고')) || '';
  const col7d = keys.find(k => k.includes('판매량') || (k.includes('판매') && !k.includes('상품명'))) || '';
  const colOpt = keys.find(k => k.includes('옵션명')) || '';

  if (!colName || !colStock || !col7d) {
    alert('필요한 컬럼을 찾을 수 없습니다.\n컬럼 확인: ' + keys.slice(0,10).join(', '));
    return;
  }

  // 코드 → 행 매핑
  const codeMap = {};
  globalDf.forEach(row => {
    const code = extractCode(String(row[colName] || ''));
    if (code) {
      if (!codeMap[code]) codeMap[code] = [];
      codeMap[code].push(row);
    }
  });

  // 고유 코드 추출
  const seenCodes = {};
  lines.forEach(line => {
    const code = extractCode(line);
    if (code && !seenCodes[code]) seenCodes[code] = line;
  });

  // 판단
  const results = [];
  for (const [code, inputLine] of Object.entries(seenCodes)) {
    const rows = codeMap[code];
    if (!rows) {
      results.push({ code, inputLine, product: inputLine, options: null, productStatus: 'unknown' });
      continue;
    }
    const realName = String(rows[0][colName] || inputLine);
    const options = rows.map(row => {
      const stock = parseInt(row[colStock]) || 0;
      const s7d = parseInt(row[col7d]) || 0;
      const criteria = Math.ceil(s7d * globalMulti);
      const shortage = criteria - stock;
      const optName = String(row[colOpt] || '');
      const soldOutKey = realName + '||' + optName;
      const soldOut = globalSoldOut[soldOutKey] || '';
      // 품절/일시품절이면 발주 판단 제외
      const isSoldOut = soldOut === '품절' || soldOut === '일시품절';
      const status = isSoldOut ? 'ok' : (stock < criteria ? 'need' : 'ok');
      return { opt: optName, stock, s7d, criteria, shortage: isSoldOut ? 0 : (shortage > 0 ? shortage : 0), status, soldOut };
    });
    const season = globalSeason[realName] || '';
    const hasNeed = options.some(o => o.status === 'need');
    const hasOk = options.some(o => o.status === 'ok');
    const productStatus = hasNeed && hasOk ? 'mixed' : hasNeed ? 'need' : 'ok';
    results.push({ code, inputLine, product: realName, options, productStatus, season });
  }

  allResults = results;
  renderResults(results);
}

  allBtn.style.cssText = 'padding:5px 10px;font-size:11px;font-weight:600;border:1px solid #2563eb;border-radius:20px;background:#2563eb;color:#fff;cursor:pointer;white-space:nowrap;font-family:Noto Sans KR,sans-serif;';

    const color = s.includes('(Y)') ? '#16a34a' : s.includes('(OFF)') ? '#d97706' : s.includes('(N)') ? '#9ca3af' : '#2563eb';
    const bg = s.includes('(Y)') ? '#f0fdf4' : s.includes('(OFF)') ? '#fffbeb' : s.includes('(N)') ? '#f3f4f6' : '#eff6ff';

    btn.textContent = s;

    btn.onclick = (function(season, b) { return function() { setSeason(season, b); }; })(s, btn);
    seasonDiv.appendChild(btn);
  });

  // 발주 추천 버튼
  const recBtn = document.createElement('button');
  recBtn.textContent = '⭐ 발주 추천';
  recBtn.style.cssText = 'margin-left:auto;padding:6px 14px;font-size:12px;font-weight:600;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer;white-space:nowrap;font-family:Noto Sans KR,sans-serif;';
  recBtn.onclick = showRecommend;
  seasonDiv.appendChild(recBtn);

  // seasonDiv는 innerHTML 설정 후 삽입
    // 툴바
  html += `<div class="toolbar">
    <input class="search-input" id="searchBox" placeholder="🔍  상품명 또는 코드 검색..." oninput="filterResults()">
    <button onclick="expandAll()" style="padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">﹢ 전체 펼치기</button>
    <button onclick="collapseAll()" style="padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">﹣ 전체 접기</button>
    <div class="filter-tabs">
      <button class="ftab active" id="tab-all" onclick="setTab('all')">전체 <span style="opacity:.5">${results.length}</span></button>
      <button class="ftab red" id="tab-need" onclick="setTab('need')">발주 필요 <span style="opacity:.5">${need.length}</span></button>
      <button class="ftab green" id="tab-ok" onclick="setTab('ok')">재고 충분 <span style="opacity:.5">${ok.length}</span></button>
    </div>
    <div style="position:relative;margin-left:auto" id="dlWrapper">
      <button class="dl-btn" onclick="toggleDlMenu()">⬇ 엑셀 저장 ▾</button>
      <div id="dlMenu" style="display:none;position:absolute;right:0;top:36px;background:#ffffff;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.15)">
        <div onclick="downloadExcel('need')" style="padding:10px 16px;font-size:13px;cursor:pointer;color:var(--color-text-primary)" onmouseover="this.style.background='var(--color-background-secondary)'" onmouseout="this.style.background=''">📋 발주 필요만</div>
        <div onclick="downloadExcel('ok')" style="padding:10px 16px;font-size:13px;cursor:pointer;color:var(--color-text-primary);border-top:0.5px solid var(--color-border-tertiary)" onmouseover="this.style.background='var(--color-background-secondary)'" onmouseout="this.style.background=''">📋 재고 충분만</div>
        <div onclick="downloadExcel('all')" style="padding:10px 16px;font-size:13px;cursor:pointer;color:var(--color-text-primary);border-top:0.5px solid var(--color-border-tertiary)" onmouseover="this.style.background='var(--color-background-secondary)'" onmouseout="this.style.background=''">📋 전체 (발주필요 + 충분)</div>
      </div>
    </div>
  </div>`;

  html += `<div class="product-list" id="productList"></div>`;

  document.getElementById('mainArea').innerHTML = html;
  // 시즌 필터 div를 맨 앞에 삽입
  document.getElementById('mainArea').insertBefore(seasonDiv, document.getElementById('mainArea').firstChild);

  renderList();

}

function setTab(tab) {
  currentTab = tab;
  ['all','need','ok'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.className = 'ftab' + (t === 'need' ? ' red' : t === 'ok' ? ' green' : '') + (tab === t ? ' active' : '');
  });
  renderList();
}

function filterResults() { renderList(); }

function renderList() {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase();
  let items = allResults;
  if (currentTab === 'need') items = items.filter(r => r.productStatus === 'need' || r.productStatus === 'mixed');
  if (currentTab === 'ok')   items = items.filter(r => r.productStatus === 'ok');
  if (currentSeason) items = items.filter(r => r.season === currentSeason);
  if (q) items = items.filter(r => r.product.toLowerCase().includes(q) || r.code.toLowerCase().includes(q));

  if (!items.length) {
    document.getElementById('productList').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">결과 없음</div></div>';
    return;
  }

  const html = items.map((item, idx) => {
    const ps = item.productStatus;
    let badgeText, badgeClass;
    if (ps === 'need')    { badgeText = '발주 필요'; badgeClass = 'need'; }
    else if (ps === 'mixed') { badgeText = '일부 발주'; badgeClass = 'mixed'; }
    else if (ps === 'ok') { badgeText = '재고 충분'; badgeClass = 'ok'; }
    else                  { badgeText = '미매칭'; badgeClass = 'ok'; }

    const needOpts = item.options ? item.options.filter(o => o.status === 'need') : [];
    const defaultOpen = (ps === 'need' || ps === 'mixed');

    let tableHtml = '';
    if (item.options && item.options.length) {
      const showOpts = item.options;
      tableHtml = `<div class="opt-table-wrap" id="opts-${idx}" style="display:${defaultOpen?'block':'none'}">
        <table>
          <thead><tr>
            <th>옵션</th>
            <th class="right">현재고</th>
            <th class="right">7일판매</th>
            <th class="right">안정재고</th>
            <th class="right">부족수량</th>
            <th class="right">판단</th>
          </tr></thead>
          <tbody>${showOpts.map(o => `
            <tr class="${o.status==='need'?'need-row':''}">
              <td class="opt-name">${o.opt} ${o.soldOut==='품절'?'<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#fef2f2;color:#dc2626;font-weight:600;margin-left:4px;">품절</span>':o.soldOut==='일시품절'?'<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#fffbeb;color:#d97706;font-weight:600;margin-left:4px;">일시품절</span>':''}</td>
              <td class="right">${o.stock}</td>
              <td class="right">${o.s7d}</td>
              <td class="right">${o.criteria}</td>
              <td class="right ${o.status==='need'?'shortage-num':''}">${o.status==='need'?o.shortage:'-'}</td>
              <td class="right"><span class="opt-badge-sm ${o.status}">${o.status==='need'?'발주필요':'충분'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    }

    return `<div class="product-card ${ps==='need'?'need':ps==='mixed'?'mixed':''}">
      <div class="product-header" onclick="toggleOpts(${idx})">
        <span class="prod-code">${item.code}</span>
        ${item.season ? `<span style="font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:2px;${
          item.season.includes('(Y)') ? 'background:#f0fdf4;color:#16a34a;' :
          item.season.includes('(OFF)') ? 'background:#fffbeb;color:#d97706;' :
          item.season.includes('(N)') ? 'background:#f3f4f6;color:#9ca3af;' :
          'background:#eff6ff;color:#2563eb;'
        }">${item.season}</span>` : ''}
        <span class="prod-name">${item.product}</span>
        ${needOpts.length ? `<span class="prod-need-count">▲ ${needOpts.length}옵션</span>` : ''}
        <span class="prod-badge ${badgeClass}">${badgeText}</span>
        <span class="chevron ${defaultOpen?'open':''}" id="chev-${idx}">▶</span>
      </div>
      ${tableHtml}
    </div>`;
  }).join('');

  document.getElementById('productList').innerHTML = html;
}

function setSeason(season, btn) {
  currentSeason = season;
  // 버튼 스타일 업데이트
  document.querySelectorAll('[id^="season-btn-"]').forEach(b => {
    const bc = b.style.borderColor || '#2563eb';
    b.style.background = b === btn ? bc : (b.style.backgroundColor || '#eff6ff');
    b.style.color = b === btn ? '#fff' : bc;
  });
  if (btn) {
    btn.style.background = btn.style.borderColor || '#2563eb';
    btn.style.color = '#fff';
  }
  renderList();
}

function showRecommend() {
  const candidates = [];
  allResults.forEach(function(item) {
    if (!item.options) return;
    const isSeasonY = !!(item.season && item.season.includes('(Y)'));
    item.options.forEach(function(o) {
      if (o.status !== 'need') return;
      candidates.push({
        product: item.product,
        code: item.code,
        season: item.season || '',
        opt: o.opt,
        stock: o.stock,
        s7d: o.s7d,
        shortage: o.shortage,
        isSeasonY: isSeasonY,
        isZeroStock: o.stock === 0
      });
    });
  });

  candidates.sort(function(a, b) {
    if (b.isSeasonY !== a.isSeasonY) return (b.isSeasonY ? 1 : 0) - (a.isSeasonY ? 1 : 0);
    if (b.s7d !== a.s7d) return b.s7d - a.s7d;
    if (b.shortage !== a.shortage) return b.shortage - a.shortage;
    return (b.isZeroStock ? 1 : 0) - (a.isZeroStock ? 1 : 0);
  });

  const top = candidates.slice(0, 20);
  if (!top.length) { alert('발주 추천 상품이 없어요!'); return; }

  const existing = document.getElementById('recommendModal');
  if (existing) existing.remove();

  // 모달 생성
  const modal = document.createElement('div');
  modal.id = 'recommendModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;';
  modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });

  const inner = document.createElement('div');
  inner.style.cssText = 'background:#fff;border-radius:12px;width:900px;max-width:95vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;';

  // 헤더
  const header = document.createElement('div');
  header.style.cssText = 'padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;';

  const title = document.createElement('span');
  title.style.cssText = 'font-size:15px;font-weight:700;color:#111827;';
  title.textContent = '⭐ 발주 추천 목록';

  const subtitle = document.createElement('span');
  subtitle.style.cssText = 'font-size:12px;color:#6b7280;';
  subtitle.textContent = '시즌Y 우선 · 판매량 · 부족수량 · 현재고0 기준 상위 20개';

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '닫기';
  closeBtn.style.cssText = 'margin-left:auto;padding:4px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#f9fafb;cursor:pointer;font-size:12px;font-family:Noto Sans KR,sans-serif;';
  closeBtn.onclick = function() { modal.remove(); };

  header.appendChild(title);
  header.appendChild(subtitle);
  header.appendChild(closeBtn);

  // 테이블
  const body = document.createElement('div');
  body.style.cssText = 'overflow-y:auto;';

  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;';

  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  hrow.style.cssText = 'background:#f9fafb;';
  ['#','코드','상품명','옵션','시즌','판매량','부족수량','현재고'].forEach(function(h, i) {
    const th = document.createElement('th');
    th.textContent = h;
    th.style.cssText = 'padding:8px 10px;font-size:11px;color:#6b7280;font-weight:600;text-align:' + (i > 4 ? 'right' : i===4 ? 'center' : 'left') + ';';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);

  const tbody = document.createElement('tbody');
  top.forEach(function(c, i) {
    const seasonColor = c.isSeasonY ? '#16a34a' : '#9ca3af';
    const seasonBg = c.isSeasonY ? '#f0fdf4' : '#f3f4f6';
    const tr = document.createElement('tr');
    tr.style.cssText = 'border-bottom:1px solid #f3f4f6;';

    const cells = [
      { text: String(i+1), align: 'left', color: '#6b7280' },
      { text: c.code, align: 'left', color: '#2563eb', mono: true },
      { text: c.product, align: 'left', color: '' },
      { text: c.opt, align: 'left', color: '#6b7280' },
      { text: c.season || '-', align: 'center', badge: true, seasonColor, seasonBg },
      { text: String(c.s7d), align: 'right', mono: true },
      { text: String(c.shortage), align: 'right', mono: true, color: '#dc2626', bold: true },
      { text: String(c.stock), align: 'right', mono: true, color: c.stock===0 ? '#dc2626' : '', bold: c.stock===0 }
    ];

    cells.forEach(function(cell) {
      const td = document.createElement('td');
      td.style.cssText = 'padding:8px 10px;font-size:12px;text-align:' + cell.align + ';'
        + (cell.mono ? 'font-family:monospace;' : '')
        + (cell.color ? 'color:' + cell.color + ';' : '')
        + (cell.bold ? 'font-weight:600;' : '');
      if (cell.badge) {
        const span = document.createElement('span');
        span.textContent = cell.text;
        span.style.cssText = 'font-size:10px;padding:2px 7px;border-radius:10px;background:' + cell.seasonBg + ';color:' + cell.seasonColor + ';font-weight:600;';
        td.appendChild(span);
      } else {
        td.textContent = cell.text;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  body.appendChild(table);
  inner.appendChild(header);
  inner.appendChild(body);
  modal.appendChild(inner);
  document.body.appendChild(modal);
}


function expandAll() {
  document.querySelectorAll('[id^="opts-"]').forEach(el => el.style.display = 'block');
  document.querySelectorAll('[id^="chev-"]').forEach(el => el.className = 'chevron open');
}

function collapseAll() {
  document.querySelectorAll('[id^="opts-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('[id^="chev-"]').forEach(el => el.className = 'chevron');
}

function toggleOpts(idx) {
  const el = document.getElementById('opts-' + idx);
  const chev = document.getElementById('chev-' + idx);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (chev) chev.className = 'chevron' + (open ? '' : ' open');
}

// ── 엑셀 다운로드 ──
function toggleDlMenu() {
  const menu = document.getElementById('dlMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  // 외부 클릭시 닫기
  setTimeout(() => {
    document.addEventListener('click', function closeDl(e) {
      if (!document.getElementById('dlWrapper').contains(e.target)) {
        menu.style.display = 'none';
        document.removeEventListener('click', closeDl);
      }
    });
  }, 0);
}

function downloadExcel(mode = 'need') {
  if (!allResults.length) return;

  const today = new Date();
  const yy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const dateStr = yy + mm + dd;
  const sheetName = (document.getElementById('sheetName')?.value?.trim() || dateStr).slice(0, 31);

  const wb = XLSX.utils.book_new();

  // ── 정확한 컬럼 매핑 (원본 템플릿 기준) ──
  // 재고, 주문 입력 후 → 재단 컬럼에 =주문*2-재고 수식
  // S/28/Free: H=재고(7),  I=주문(8),  J=재단(9)
  // M/30:      M=재고(12), N=주문(13), O=재단(14)
  // L/32:      R=재고(17), S=주문(18), T=재단(19)
  // XL/34:     W=재고(22), X=주문(23), Y=재단(24)
  // 2XL/36:    AB=재고(27),AC=주문(28),AD=재단(29)
  // 3XL/38:    AG=재고(32),AH=주문(33),AI=재단(34)
  // 40:        AL=재고(37),AM=주문(38),AN=재단(39)
  // 조회용: 어떤 사이즈 표기든 컬럼 정보 반환
  const SIZE_LOOKUP = {
    'S':'S','28':'S','Free':'S',
    'M':'M','30':'M',
    'L':'L','32':'L',
    'XL':'XL','34':'XL',
    '2XL':'2XL','36':'2XL',
    '3XL':'3XL','38':'3XL',
    '40':'40',
  };
  // 루프용: 중복 없이 순서대로
  const SIZE_MAP = {
    'S':   { 재고: 7,  주문: 8,  재단: 9,  재고col: 'H',  주문col: 'I'  },
    'M':   { 재고: 12, 주문: 13, 재단: 14, 재고col: 'M',  주문col: 'N'  },
    'L':   { 재고: 17, 주문: 18, 재단: 19, 재고col: 'R',  주문col: 'S'  },
    'XL':  { 재고: 22, 주문: 23, 재단: 24, 재고col: 'W',  주문col: 'X'  },
    '2XL': { 재고: 27, 주문: 28, 재단: 29, 재고col: 'AB', 주문col: 'AC' },
    '3XL': { 재고: 32, 주문: 33, 재단: 34, 재고col: 'AG', 주문col: 'AH' },
    '40':  { 재고: 37, 주문: 38, 재단: 39, 재고col: 'AL', 주문col: 'AM' },
  };
  const TOTAL_COLS = 42;

  function emptyRow() { return Array(TOTAL_COLS).fill(null); }

  // ── 헤더 행1 ──
  const row1 = emptyRow();
  row1[0]  = '일자';
  row1[1]  = '품명/품번';
  row1[2]  = '색상';
  row1[3]  = '총수량(절수)';
  row1[6]  = 'S(28),Free';
  row1[11] = 'M (30)';
  row1[16] = 'L (32)';
  row1[21] = 'XL (34)';
  row1[26] = '2XL (36)';
  row1[30] = '3XL (38)';
  row1[35] = '40';
  row1[41] = '특이 사항';

  // ── 헤더 행2 ──
  const row2 = emptyRow();
  row2[3]  = '발주'; row2[4] = '재단'; row2[5] = '절당\n재단수량';
  const subHeaders = ['발주','재고','주문','재단','입고'];
  [6,11,16,21,26,30,35].forEach(startCol => {
    subHeaders.forEach((h,i) => { row2[startCol+i] = h; });
  });

  const wsData = [row1, row2];

  // ── 발주 필요 상품 데이터 ──
  const needData = mode === 'all'
    ? allResults.filter(r => r.options)
    : mode === 'ok'
    ? allResults.filter(r => r.productStatus === 'ok')
    : allResults.filter(r => r.productStatus === 'need' || r.productStatus === 'mixed');

  needData.forEach(item => {
    if (!item.options) return;

    // 색상별 그룹화
      const colorMap = {};
      item.options.forEach(o => {
        const { color, size } = parseColorSize(o.opt);
        const normalSize = SIZE_LOOKUP[size] || size; // 30→M, 32→L 등 정규화
        if (!colorMap[color]) colorMap[color] = {};
        colorMap[color][normalSize] = { stock: o.stock, s7d: o.s7d };
      });
    Object.entries(colorMap).forEach(([color, sizeData]) => {
      const row = emptyRow();
      const rowNum = wsData.length + 1; // 1-based 엑셀 행번호

      row[0] = `${yy}-${mm}-${dd}`;
      row[1] = item.product;
      row[2] = color;
      row[41] = global7dLabel || `7일 판매량\n(${yy}.${mm}.${dd})`;

      Object.entries(SIZE_MAP).forEach(([sz, cols]) => {
        const d = sizeData[sz] || {};
        const stock = d.stock || 0;
        const s7d   = d.s7d   || 0;
        row[cols.재고] = stock;
        row[cols.주문] = s7d;
        // 재단 = 주문*2 - 재고 수식
        row[cols.재단] = { f: `${cols.주문col}${rowNum}*2-${cols.재고col}${rowNum}`, v: Math.max(s7d*2-stock, 0) };
      });

      wsData.push(row);
    });
  });

  const ws1 = XLSX.utils.aoa_to_sheet(wsData);

  // 컬럼 너비 (원본 기준)
  const colWidths = [
    {wch:9.75},{wch:35},{wch:14},{wch:7.25},{wch:7.25},{wch:6},
  ];
  for(let i=0;i<36;i++) colWidths.push({wch:7.125});
  colWidths.push({wch:9},{wch:37.75});
  ws1['!cols'] = colWidths;

  // 머지 셀 (원본 템플릿과 동일)
  ws1['!merges'] = [
    {s:{r:0,c:0},e:{r:1,c:0}},   // A1:A2
    {s:{r:0,c:1},e:{r:1,c:1}},   // B1:B2
    {s:{r:0,c:2},e:{r:1,c:2}},   // C1:C2
    {s:{r:0,c:3},e:{r:0,c:5}},   // D1:F1
    {s:{r:0,c:6},e:{r:0,c:10}},  // G1:K1
    {s:{r:0,c:11},e:{r:0,c:15}}, // L1:P1
    {s:{r:0,c:16},e:{r:0,c:20}}, // Q1:U1
    {s:{r:0,c:21},e:{r:0,c:25}}, // V1:Z1
    {s:{r:0,c:26},e:{r:0,c:30}}, // AA1:AE1
    {s:{r:0,c:31},e:{r:0,c:35}}, // AF1:AJ1
    {s:{r:0,c:36},e:{r:0,c:40}}, // AK1:AO1
    {s:{r:0,c:41},e:{r:1,c:41}}, // AP1:AP2
  ];

  XLSX.utils.book_append_sheet(wb, ws1, sheetName);

  // ── 전체 데이터 시트 ──
  const allRows = [['상품코드','상품명','옵션명','현재고','7일판매량','안정재고(7일×2)','부족수량','판단']];
  allResults.forEach(item => {
    if (!item.options) {
      allRows.push([item.code, item.product, '-','-','-','-','-','미매칭']);
    } else {
      item.options.forEach(o => {
        allRows.push([item.code, item.product, o.opt, o.stock, o.s7d, o.criteria,
          o.status==='need'?o.shortage:0, o.status==='need'?'발주 필요':'재고 충분']);
      });
    }
  });
  const ws2 = XLSX.utils.aoa_to_sheet(allRows);
  XLSX.utils.book_append_sheet(wb, ws2, '전체데이터');

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const filePrefix = mode === 'all' ? '발주서_전체_' : mode === 'ok' ? '발주서_재고충분_' : '발주서_발주필요_';
  a.download = filePrefix + dateStr + '.xlsx';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 500);
}
</script>

<script src="./xlsx.js"></script>
</body></html>
